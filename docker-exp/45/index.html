<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login Portal</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', sans-serif;
        }

        body{
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:#fff;
            width:350px;
            padding:35px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        .card h1{
            color:#1e3c72;
            margin-bottom:10px;
        }

        .card p{
            color:#666;
            margin-bottom:25px;
            font-size:14px;
        }

        .input-box{
            margin-bottom:18px;
            text-align:left;
        }

        .input-box label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
            color:#333;
        }

        .input-box input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        .login-btn{
            width:100%;
            padding:12px;
            background:#1e3c72;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .login-btn:hover{
            background:#16305c;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Student Portal</h1>
    <p>Sign in to continue</p>

    <form action="welcome.html">

        <div class="input-box">
            <label>Username</label>
            <input type="text" placeholder="Enter Username" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
        </div>

        <button class="login-btn" type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
